name: API Tests

# Rule 3.3: run on pull requests targeting main and on pushes to main (merges).
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  path-coverage:
    runs-on: ubuntu-latest

    steps:
      # Step 1: clone repository
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # Step 2: install dependencies
      - name: Install dependencies
        run: npm install

      # Step 3: run the API in background
      - name: Start API in background
        run: npm start &

      # Step 4: wait until the API is running (Rule 3.2 - use the healthcheck)
      - name: Wait for API healthcheck
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/healthcheck > /dev/null; then
              echo "API is up"
              exit 0
            fi
            echo "Waiting for API... ($i)"
            sleep 2
          done
          echo "API did not become healthy in time"
          exit 1

      # Step 5: run the test scripts
      - name: Run path coverage tests
        run: npm run test:path
